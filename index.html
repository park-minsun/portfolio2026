<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>2025 PORTFOLIO</title>
	<link rel="stylesheet" href="/css/style.css">
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>

<body>
	<header class="header">
		<div class="header-inner">
			<a href="/" class="logo">
				<img src="/images/logo.svg" alt="로고">
			</a>
			<nav>
				<ul>
					<li><a href="" data-text="Design"><span>Design</span></a></li>
					<li><a href="" data-text="Publishing"><span>Publishing</span></a></li>
					<li><a href="" data-text="Resume"><span>Resume</span></a></li>
				</ul>
			</nav>
		</div>
	</header>
	<div class="container">
		<div class="main-cont">
			<div class="main-visual">
        <div class="bg">
          <div class="star pink">
            <img src="/images/pink_star.png" alt="">
          </div>
          <div class="star blue">
            <img src="/images/blue_star.png" alt="">
          </div>
        </div>
			</div>

      <section class="sec1">

      </section>
		</div>
	</div>

  <script>
  const mainVisual = document.querySelector(".main-visual");

  mainVisual.addEventListener("mousemove", (e) => {
    let x = (e.clientX / window.innerWidth - 1) * 4;
    let y = (e.clientY / window.innerHeight - 1) * 4;

    gsap.to(".star.pink", {
      x: x * 50,
      y: y * 50,
      duration: 0.5,
      ease: "power2.out"
    });

      gsap.to(".star.blue", {
        x: -x * 40,
        y: -y * 40,
        duration: 0.5,
        ease: "power2.out"
      });
    });
  </script>
</body>

</html>
