<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>2025 PORTFOLIO</title>
	<link rel="stylesheet" href="/css/style.css">
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>

<body>
	<header class="header">
		<div class="header-inner">
			<a href="/" class="logo">
				<img src="/images/logo.svg" alt="로고">
			</a>
			<nav>
				<ul>
					<li><a href="" data-text="Design"><span>Design</span></a></li>
					<li><a href="" data-text="Publishing"><span>Publishing</span></a></li>
					<li><a href="" data-text="Resume"><span>Resume</span></a></li>
				</ul>
			</nav>
		</div>
	</header>
	<div class="container">
		<div class="main-cont">
			<div class="main-visual">
        <div class="bg">
          <div class="star pink">
            <img src="/images/pink_star.png" alt="">
          </div>
          <div class="star blue">
            <img src="/images/blue_star.png" alt="">
          </div>
        </div>
			</div>

      <section class="sec1">
        <div class="pin-wrap">
          <div class="left">
            <img src="./images/me.png" alt="">
          </div>
          <div class="right">
            <div class="text text1">
              <p>안녕</p>
            </div>
            <div class="text text2">
              <p>반가워</p>
            </div>
            <div class="text text3">
              <p>굿바이</p>
            </div>
          </div>
        </div>
      </section>
      
      <section class="sec2" style="height: 100vh;">

      </section>
		</div>
	</div>

  <script>
  const mainVisual = document.querySelector(".main-visual");

  mainVisual.addEventListener("mousemove", (e) => {
    let x = (e.clientX / window.innerWidth - 1) * 4;
    let y = (e.clientY / window.innerHeight - 1) * 4;

    gsap.to(".star.pink", {
      x: x * 50,
      y: y * 50,
      duration: 0.5,
      ease: "power2.out"
    });

      gsap.to(".star.blue", {
        x: -x * 40,
        y: -y * 40,
        duration: 0.5,
        ease: "power2.out"
      });
    });

    // sec1 스크롤 트리거

    gsap.registerPlugin(ScrollTrigger);

    // 텍스트들 모음
    const texts = gsap.utils.toArray(".right .text");

    // TL 생성
    let tl = gsap.timeline({
      scrollTrigger: {
        trigger: ".sec1 .pin-wrap",
        start: "top top",   // 화면 상단에 닿으면 시작
        end: "+=300%",      // 스크롤 3배 길이 동안 진행
        scrub: true,
        pin: true,          // pin-wrap 고정
        anticipatePin: 1
      }
    });

    // 각 text를 순서대로 보여주고 숨기기
    texts.forEach((text, i) => {
      tl.to(text, {
        opacity: 1,
        duration: 0.5
      }, "+=0.5"); // 약간의 간격
      
      tl.to(text, {
        opacity: 0,
        duration: 0.5
      }, "+=0.5"); // 사라지면서 다음으로 넘어감
    });
  </script>
</body>

</html>
